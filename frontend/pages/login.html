<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — InternAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div class="auth-page">
    <div class="auth-bg">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
    </div>
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">Intern<span>AI</span></a>
      <div class="auth-sub">Login to your account</div>
      <form id="loginForm" onsubmit="InternAI.handleLogin(event)">
        <div class="form-group"><label class="form-label">Email Address</label><input class="form-input" id="email"
            type="email" placeholder="your@email.com" required /></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="password"
            type="password" placeholder="Min 8 characters" required /></div>
        <button type="submit" class="btn-submit">Login to Dashboard</button>
      </form>
      <div class="divider"><span>or continue with demo</span></div>
      <button type="button" onclick="InternAI.demoLogin()" class="btn-submit"
        style="background:var(--card2);border:1px solid var(--border2);color:var(--text2);margin-top:0">🚀 Try Demo
        Account</button>
      <div class="auth-footer">Don't have an account? <a href="register.html">Register free →</a></div>
    </div>
  </div>
  <script src="../js/main.js"></script>
  <script>
    if (localStorage.getItem('intern_token')) window.location.href = './dashboard.html';
  </script>
</body>

</html>
