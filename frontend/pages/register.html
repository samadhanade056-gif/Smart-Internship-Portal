<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — InternAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"><div class="orb orb1"></div><div class="orb orb2"></div></div>
  <div class="auth-card">
    <div class="auth-logo">Intern<span>AI</span></div>
    <div class="auth-sub">Create your free account</div>
    <form onsubmit="InternAI.handleRegister(event)">
      <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="name" type="text" placeholder="Your full name" required/></div>
      <div class="form-group"><label class="form-label">Email Address *</label><input class="form-input" id="email" type="email" placeholder="your@email.com" required/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Password *</label><input class="form-input" id="password" type="password" placeholder="Min 8 chars" required/></div>
        <div class="form-group"><label class="form-label">Confirm Password *</label><input class="form-input" id="confirm_password" type="password" placeholder="Repeat password" required/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">College</label><input class="form-input" id="college" type="text" placeholder="Your college"/></div>
        <div class="form-group"><label class="form-label">Branch</label><input class="form-input" id="branch" type="text" placeholder="B.Tech CSE"/></div>
      </div>
      <div class="form-group"><label class="form-label">Mobile</label><input class="form-input" id="mobile" type="tel" placeholder="+91 9876543210"/></div>
      <button type="submit" class="btn-submit">Create Account Free</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="login.html">Login →</a></div>
  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
